version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - '${API_PORT:-3000}:3000'
    environment:
      - NODE_ENV=production
      - NOTES_V3_PATH=/app/apps/server/data/dev_notes_v3.json
      - CORS_ORIGIN=http://localhost:${DEV_CLIENT_PORT:-8080}
    volumes:
      - server-data:/app/apps/server/data:Z

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    ports:
      - '${DEV_CLIENT_PORT:-8080}:80'
    environment:
      - NODE_ENV=production
      - API_HOST=localhost
      - API_PORT=${API_PORT:-3000}
    depends_on:
      - server

volumes:
  server-data:
